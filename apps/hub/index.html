<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klinflow | Hub Ops</title>
  
<style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #065f46;
      /* Fallback matching emerald-800 */
    }

    #initial-loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom right, hsl(153, 100%, 33%), #059669, #065f46);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      font-family: sans-serif;
      overflow: hidden;
    }

    .loader-bg-circles {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.15;
    }

    .loader-circle-1 {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid white;
      transform: translateY(-100px);
    }

    .loader-circle-2 {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      border: 1px solid white;
      transform: translateY(100px);
    }

    .loader-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 24px;
      margin-top: -64px;
    }

    .loader-icon-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-ring-outer {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .loader-ring-spin {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border-top: 2px solid rgba(255, 255, 255, 0.8);
      border-right: 2px solid transparent;
      border-bottom: 2px solid transparent;
      border-left: 2px solid transparent;
      animation: spin 3s linear infinite;
    }

    .loader-inner-logo {
      position: absolute;
      width: 140px;
      height: 140px;
      object-fit: contain;
      z-index: 10;
      animation: icon-float 2.5s ease-in-out infinite;
    }

    .loader-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .loader-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
    }

    .loader-brand-text {
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.9);
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .loader-tagline {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.025em;
      margin: 0 0 32px 0;
    }

    .loader-bouncing-dots {
      display: flex;
      gap: 10px;
    }

    .bounce-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .bounce-dot:nth-child(1) {
      animation-delay: 0ms;
    }

    .bounce-dot:nth-child(2) {
      animation-delay: 150ms;
    }

    .bounce-dot:nth-child(3) {
      animation-delay: 300ms;
    }

    .loader-footer {
      position: absolute;
      bottom: 48px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .loader-footer-text {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes icon-float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.7);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
  <body>
    <div id="initial-loader">
    <div class="loader-bg-circles">
      <div class="loader-circle-1"></div>
      <div class="loader-circle-2"></div>
    </div>
    <div class="loader-content">
      <div class="loader-icon-container">
        <div class="loader-ring-outer"></div>
        <div class="loader-ring-spin"></div>
        <img src="/vectors/client-app-logo.webp" alt="Client App Logo" class="loader-inner-logo" />
      </div>

      <div class="loader-brand">
        <div class="loader-dot"></div>
        <span class="loader-brand-text">Klinflow</span>
        <div class="loader-dot"></div>
      </div>

      <p class="loader-tagline">Collecting.Connecting.Cleaning</p>

      <div class="loader-bouncing-dots">
        <div class="bounce-dot"></div>
        <div class="bounce-dot"></div>
        <div class="bounce-dot"></div>
      </div>
    </div>

    <div class="loader-footer">
      <p class="loader-footer-text">AI Powered Informal weaver Network</p>
    </div>
  </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
